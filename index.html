<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NS Analyzer v2</title>

    <link rel="stylesheet" href="styles.css"/>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
</head>

<body>

<div class="container">

    <h1>NS Analyzer v2</h1>

    <div class="controls">
        <input id="url" placeholder="Nightscout URL"/>
        <button id="analyze">Анализ</button>
    </div>

    <div class="grid">

        <div class="block">
            <h2>Базал</h2>
            <table id="basal-table"></table>
        </div>

        <div class="block">
            <h2>ISF</h2>
            <table id="isf-table"></table>
        </div>

        <div class="block">
            <h2>CR</h2>
            <table id="cr-table"></table>
        </div>

    </div>

    <div class="charts">

        <canvas id="glucose-chart"></canvas>

        <canvas id="cob-iob-chart"></canvas>

    </div>

</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
